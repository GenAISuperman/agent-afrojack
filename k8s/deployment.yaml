apiVersion: apps/v1
kind: Deployment
metadata:
  name: "afrojack"
  namespace: "agents-ctp"
  labels:
    app: "afrojack"
    team: "ctp"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "afrojack"
  template:
    metadata:
      labels:
        app: "afrojack"
        team: "ctp"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-afrojack"
      containers:
        - name: "afrojack"
          image: "acrshoppoc.azurecr.io/agents/afrojack:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-afrojack"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
